apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog-api-local-4-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/doyindevops/gitops-environments.git
    targetRevision: main
    path: dev/catalog-api-local-4
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
